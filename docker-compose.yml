services:
  app:
    build: .
    volumes:
      - tiktok-slide-generator:/root/.notes

  nginx:
    image: nginx:1.29.7-alpine3.23
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  tiktok-slide-generator:
    name: tiktok-slide-generator
